spring:
  datasource:
    url: jdbc:mysql://localhost:3306/flink
    username: root
    password: ${DB_PW}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        show_sql: true
        format_sql: true
        use_sql_comments: true
        hbm2ddl:
          auto: update
        default_batch_fetch_size: 1000
  mail:
    host: smtp.gmail.com
    port : 587
    username : ${MAIL_NAME}
    password : ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          timeout: 5000
  jwt:
    secret : ${JWT_SECRET}
    token:
      access_expiration: 7200000
      refresh_expiration: 2592000000
  data:
    redis:
      host: localhost
      port : 6379

logging:
  level:
    org.hibernate.SQL: TRACE